<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthSnap Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .neon-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }
        .mic-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold tracking-tighter uppercase italic">
            Wealth<span class="text-green-500">Snap</span>
        </h1>
    </header>

    <div class="grid grid-cols-2 gap-4 w-full max-w-md mb-8">
        <div class="bg-zinc-900 p-4 rounded-xl text-center border border-zinc-800">
            <p class="text-xs uppercase text-zinc-500 tracking-widest">Today</p>
            <p id="todayTotal" class="text-2xl font-bold">0</p>
        </div>
        <div class="bg-zinc-900 p-4 rounded-xl text-center border border-zinc-800">
            <p class="text-xs uppercase text-zinc-500 tracking-widest">Month</p>
            <p id="monthTotal" class="text-2xl font-bold">0</p>
        </div>
    </div>

    <div class="flex flex-col items-center gap-6 w-full max-w-md">
        <p id="status" class="text-zinc-400 text-sm italic">Tap mic to speak...</p>
        
        <button id="micBtn" class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center neon-glow transition-all active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
        </button>

        <div id="resultBox" class="text-center min-h-[50px]">
            <p id="transcript" class="text-lg font-medium text-zinc-200"></p>
        </div>

        <button id="syncBtn" class="w-full bg-white text-black font-bold py-4 rounded-lg uppercase tracking-widest hover:bg-zinc-200 transition-colors hidden">
            Sync Transaction
        </button>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');
        const transcriptDisplay = document.getElementById('transcript');
        const syncBtn = document.getElementById('syncBtn');
        
        let lastTranscript = "";

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US'; // Supports Hinglish/Bengali accents better in US mode
        recognition.interimResults = false;

        micBtn.onclick = () => {
            recognition.start();
            micBtn.classList.add('mic-active');
            status.innerText = "Listening...";
        };

        recognition.onresult = (event) => {
            micBtn.classList.remove('mic-active');
            lastTranscript = event.results[0][0].transcript;
            transcriptDisplay.innerText = lastTranscript;
            status.innerText = "Captured! Tap Sync to save.";
            syncBtn.classList.remove('hidden');
        };

        syncBtn.onclick = async () => {
            status.innerText = "Syncing with AI...";
            syncBtn.disabled = true;
            syncBtn.innerText = "Processing...";

            try {
                // FIXED: Changed endpoint to match server.js
                const response = await fetch('/process-voice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: lastTranscript })
                });

                const result = await response.json();
                
                if (result.success) {
                    status.innerText = "✅ Sync Successful!";
                    syncBtn.classList.add('hidden');
                    transcriptDisplay.innerText = `Saved: ${result.data.item} - ${result.data.amount}`;
                    // Simple total update logic (optional)
                    document.getElementById('todayTotal').innerText = 
                        parseInt(document.getElementById('todayTotal').innerText) + result.data.amount;
                } else {
                    status.innerText = "❌ Sync Failed. Try again.";
                }
            } catch (err) {
                console.error("Sync Error:", err);
                status.innerText = "❌ Network Error.";
            } finally {
                syncBtn.disabled = false;
                syncBtn.innerText = "Sync Transaction";
            }
        };
    </script>
</body>
</html>
